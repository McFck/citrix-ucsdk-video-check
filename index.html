<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Citrix UCSDK Video Check</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main>
      <h1>Citrix UCSDK Video Check</h1>
      <p>
        Simple check for the Citrix HDX optimized WebRTC bug where local or optimized
        remote video is not visible.
      </p>

      <div class="controls">
        <button id="startBtn" type="button">Start check</button>
        <button id="stopBtn" type="button">Stop</button>
      </div>

      <section class="videos">
        <div>
          <h2>Own camera feed</h2>
          <video id="localVideo" autoplay muted playsinline></video>
        </div>
        <div>
          <h2>Loopback remote feed</h2>
          <video id="remoteVideo" autoplay playsinline></video>
        </div>
      </section>

      <pre id="log"></pre>
    </main>

    <script src="./vendor/CitrixBootstrap.js"></script>
    <script src="./vendor/CitrixWebRTC.js"></script>
    <script src="./app.js"></script>
  </body>
</html>
